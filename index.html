<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>naginn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="body">
           <div id="scoreBox">Score: 0</div>
            <div id="highscore">HighScore: 0</div>
            <div id="controls">
                <label for="speedInput">Speed:</label>
                <input id="speedInput" type="number" min="1" max="20" value="9">
                <span id="speedValue">9</span>
            </div>
            <div id="touchControls" aria-hidden="false">
                <button id="btnUp" class="touch-btn">↑</button>
                <div class="touch-row">
                    <button id="btnLeft" class="touch-btn">←</button>
                    <button id="btnDown" class="touch-btn">↓</button>
                    <button id="btnRight" class="touch-btn">→</button>
                </div>
            </div>
        <div id="board"></div>
</div>
</body>
<script src="javascript.js"></script>
</html>
